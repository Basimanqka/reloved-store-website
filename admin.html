<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Закачалката — Админ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>

    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #FAF7F4; --white: #FFFFFF; --border: #EDE2D8;
            --text: #2C2420; --muted: #8B5E52; --faint: #C9B4AB;
            --accent: #AA5878; --accent-dark: #7A3E56; --accent-soft: #F5E6EC; --teal: #89CECA;
            --serif: 'Cormorant Garamond', serif; --sans: 'Inter', sans-serif;
        }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        button { font-family: inherit; cursor: pointer; }
        input, select, textarea { font-family: inherit; }
        img { display: block; }

        /* ===== LOGIN VIEW ===== */
        #loginView {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.8rem 2.6rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(44,36,32,0.06);
        }
        .login-logo {
            font-family: var(--serif);
            font-size: 2rem;
            font-weight: 400;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .login-sub {
            font-size: 0.82rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 0.3px;
        }
        .login-error {
            background: #FBEAEA;
            color: #B23A3A;
            font-size: 0.85rem;
            padding: 0.7rem 0.9rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }
        .lfield { margin-bottom: 1.1rem; }
        .lfield label {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        .lfield input {
            width: 100%;
            padding: 0.75rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .lfield input:focus { outline: none; border-color: var(--accent); }
        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 0.4rem;
            transition: background 0.2s;
        }
        .login-btn:hover { background: var(--accent); }
        .login-btn:disabled { opacity: 0.6; cursor: default; }
        .login-back {
            display: block;
            text-align: center;
            margin-top: 1.6rem;
            font-size: 0.8rem;
            color: var(--muted);
            transition: color 0.2s;
        }
        .login-back:hover { color: var(--accent); }

        /* ===== DASHBOARD VIEW ===== */
        #dashboardView { display: none; }

        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 1.1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .topbar h1 { font-family: var(--serif); font-size: 1.5rem; font-weight: 500; }
        .topbar-right { display: flex; align-items: center; gap: 1rem; font-size: 0.85rem; color: var(--muted); }

        .btn {
            padding: 0.55rem 1.1rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--white);
            font-size: 0.85rem;
            font-weight: 500;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(170,88,120,0.25); }
        .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); opacity: 1; color: white; }
        .btn-danger { color: #B23A3A; }
        .btn-danger:hover { border-color: #B23A3A; color: #B23A3A; }
        .btn-small { padding: 0.35rem 0.7rem; font-size: 0.78rem; }

        .container { max-width: 1300px; margin: 0 auto; padding: 2rem; }

        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.6rem; }
        .tab-btn {
            padding: 0.6rem 1.3rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--white);
            font-size: 0.88rem;
            transition: all 0.2s;
        }
        .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .tab-btn.active:hover { color: white; }

        .panel {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.8rem;
            margin-bottom: 1.6rem;
            box-shadow: 0 4px 24px rgba(44,36,32,0.05);
        }
        #productFormPanel { border-color: var(--accent-soft); box-shadow: 0 8px 40px rgba(170,88,120,0.10); }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }
        .panel-header h2 { font-family: var(--serif); font-size: 1.3rem; font-weight: 500; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.6rem 0.7rem; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 500; }
        td { padding: 0.7rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        .thumb-sm { width: 46px; height: 46px; object-fit: cover; border-radius: 6px; background: var(--bg); }
        .price-old { text-decoration: line-through; color: var(--faint); font-size: 0.8rem; margin-left: 0.3rem; }
        .status-pill { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.75rem; }
        .status-available { background: rgba(137,206,202,0.15); color: #4C8B86; }
        .status-sold { background: rgba(44,36,32,0.08); color: var(--muted); }
        .row-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        /* form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-grid .full { grid-column: 1 / -1; }
        .field label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            display: block;
            margin-bottom: 0.4rem;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 0.65rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .field textarea { resize: vertical; min-height: 80px; }
        .field-hint { font-size: 0.72rem; color: var(--faint); margin-top: 0.3rem; }

        /* ===== IMAGE UPLOADER ===== */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 10px;
            background: var(--bg);
            padding: 1.8rem 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .dropzone:hover { border-color: var(--accent); background: var(--accent-soft); }
        .dropzone.dragover { border-color: var(--accent); background: var(--accent-soft); }
        .dropzone svg { width: 30px; height: 30px; stroke: var(--muted); margin-bottom: 0.6rem; }
        .dropzone:hover svg, .dropzone.dragover svg { stroke: var(--accent); }
        .dropzone-title { font-size: 0.9rem; color: var(--text); }
        .dropzone-title span { color: var(--accent); text-decoration: underline; }
        .dropzone-hint { font-size: 0.72rem; color: var(--faint); margin-top: 0.35rem; }

        .image-manager {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: 0.7rem;
            margin-top: 0.9rem;
        }
        .image-manager:empty { display: none; }
        .img-tile {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg);
            cursor: grab;
            transition: box-shadow 0.15s, transform 0.15s;
        }
        .img-tile:active { cursor: grabbing; }
        .img-tile.dragging { opacity: 0.4; }
        .img-tile.drop-target { box-shadow: 0 0 0 2px var(--accent); }
        .img-tile img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .img-tile .img-remove {
            position: absolute;
            top: 4px; right: 4px;
            width: 22px; height: 22px;
            border-radius: 50%;
            border: none;
            background: rgba(44,36,32,0.6);
            color: #fff;
            font-size: 15px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
        }
        .img-tile:hover .img-remove { opacity: 1; }
        .img-tile .img-remove:hover { background: #B23A3A; }
        .img-tile .img-main-badge {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: var(--accent);
            color: #fff;
            font-size: 0.62rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
            padding: 2px 0;
        }
        .checkbox-field { display: flex; align-items: center; gap: 0.7rem; padding-top: 1.6rem; }
        .checkbox-field input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
        .checkbox-field label { font-size: 0.9rem; cursor: pointer; color: var(--text); }
        .form-actions { display: flex; gap: 0.7rem; margin-top: 1.5rem; }

        .empty-msg, .loading-msg { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 0.9rem; }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--text);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #B23A3A; }

        /* image reorder arrows (shown on touch, since drag-drop doesn't work there) */
        .img-move {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(44,36,32,0.55);
            color: #fff;
            font-size: 18px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        .img-move.left  { left: 4px; }
        .img-move.right { right: 4px; }
        .img-move:active { background: var(--accent); }

        /* ===== RESPONSIVE / MOBILE ===== */
        @media (max-width: 720px) {
            .form-grid { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
            .topbar { padding: 1rem; }
        }

        /* touch devices: no hover, so keep the image remove button visible */
        @media (hover: none) {
            .img-tile .img-remove { opacity: 1; width: 26px; height: 26px; font-size: 17px; }
        }

        @media (max-width: 640px) {
            /* topbar wraps and shrinks; email truncates instead of overflowing */
            .topbar { padding: 0.8rem 1rem; flex-wrap: wrap; gap: 0.4rem 0.8rem; }
            .topbar h1 { font-size: 1.2rem; }
            .topbar-right { font-size: 0.75rem; gap: 0.7rem; }
            #userEmail { max-width: 42vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

            /* tabs share the width */
            .tabs { gap: 0.4rem; }
            .tab-btn { flex: 1; text-align: center; padding: 0.7rem 0.4rem; }

            .panel { padding: 1.1rem; border-radius: 10px; }
            .panel-header { flex-wrap: wrap; gap: 0.6rem; }
            .panel-header h2 { font-size: 1.15rem; }

            /* larger tap targets; 16px inputs stop iOS from auto-zooming on focus */
            .btn { padding: 0.62rem 1rem; }
            .btn-small { padding: 0.55rem 0.85rem; font-size: 0.82rem; }
            .field input, .field select, .field textarea, .lfield input { font-size: 16px; }

            /* action buttons stack full width */
            .form-actions { flex-direction: column; }
            .form-actions .btn { width: 100%; text-align: center; padding: 0.85rem; }
            .checkbox-field { padding-top: 0; }

            /* ---- tables collapse into stacked cards ---- */
            #productsTableWrap thead, #ordersTableWrap thead { display: none; }
            #productsTableWrap table, #ordersTableWrap table,
            #productsTableWrap tbody, #ordersTableWrap tbody,
            #productsTableWrap tr, #ordersTableWrap tr,
            #productsTableWrap td, #ordersTableWrap td { display: block; width: 100%; }
            #productsTableWrap tr, #ordersTableWrap tr {
                border: 1px solid var(--border);
                border-radius: 10px;
                margin-bottom: 0.85rem;
                padding: 0.25rem 0.95rem;
                background: var(--white);
                box-shadow: 0 1px 6px rgba(44,36,32,0.04);
            }
            #productsTableWrap td, #ordersTableWrap td {
                border: none;
                border-bottom: 1px solid var(--border);
                padding: 0.6rem 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 1rem;
                text-align: right;
            }
            #productsTableWrap tr td:last-child,
            #ordersTableWrap tr td:last-child { border-bottom: none; }
            /* keep separators inside the very last card too */
            #productsTableWrap tr:last-child td:not(:last-child),
            #ordersTableWrap tr:last-child td:not(:last-child) { border-bottom: 1px solid var(--border); }
            #productsTableWrap td::before, #ordersTableWrap td::before {
                content: attr(data-label);
                font-size: 0.68rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--muted);
                font-weight: 600;
                text-align: left;
                flex: 0 0 auto;
            }
            #productsTableWrap td:empty, #ordersTableWrap td:empty { display: none; }
            td.cell-img { justify-content: center; }
            td.cell-img::before { display: none; }
            td.cell-img .thumb-sm { width: 96px; height: 96px; }
            .row-actions { flex: 1; flex-wrap: nowrap; }
            .row-actions .btn { flex: 1; text-align: center; }
            #productsTableWrap td select, #ordersTableWrap td select { max-width: 62%; font-size: 16px; padding: 0.5rem; }

            /* toast spans the width so it never runs off-screen */
            .toast { left: 1rem; right: 1rem; bottom: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- ============================= -->
    <!-- LOGIN VIEW                    -->
    <!-- ============================= -->

    <div id="loginView">
        <div class="login-card">
            <p class="login-logo">Закачалката</p>
            <p class="login-sub">Админ панел — достъп само за собственика</p>

            <div class="login-error" id="loginError"></div>

            <form id="loginForm">
                <div class="lfield">
                    <label for="loginEmail">Имейл</label>
                    <input type="email" id="loginEmail" required autocomplete="username" />
                </div>
                <div class="lfield">
                    <label for="loginPwd">Парола</label>
                    <input type="password" id="loginPwd" required autocomplete="current-password" />
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Вход</button>
            </form>

            <a href="store.html" class="login-back">← Обратно към магазина</a>
        </div>
    </div>


    <!-- ============================= -->
    <!-- DASHBOARD VIEW                -->
    <!-- ============================= -->

    <div id="dashboardView">

        <header class="topbar">
            <h1>Закачалката — Админ</h1>
            <div class="topbar-right">
                <span id="userEmail"></span>
                <button class="btn" onclick="doLogout()">Изход</button>
            </div>
        </header>

        <div class="container">

            <div class="tabs">
                <button class="tab-btn active" id="tabProductsBtn" onclick="switchTab('products')">Продукти</button>
                <button class="tab-btn" id="tabOrdersBtn" onclick="switchTab('orders')">Поръчки</button>
            </div>

            <!-- PRODUCTS TAB -->
            <div id="productsTab">

                <div class="panel" id="productFormPanel" style="display:none;">
                    <div class="panel-header">
                        <h2 id="formTitle">Нов продукт</h2>
                        <button class="btn btn-small" onclick="closeProductForm()">Затвори</button>
                    </div>

                    <form id="productForm">
                        <input type="hidden" id="productId" />
                        <div class="form-grid">
                            <div class="field"><label>Марка *</label><input type="text" id="f_brand" required /></div>
                            <div class="field"><label>Название *</label><input type="text" id="f_name" required /></div>

                            <div class="field">
                                <label>Категория *</label>
                                <select id="f_category" required>
                                    <option value="jackets">Якета</option>
                                    <option value="dresses">Рокли</option>
                                    <option value="tops">Блузи</option>
                                    <option value="jeans">Дънки</option>
                                    <option value="shoes">Обувки</option>
                                    <option value="accessories">Аксесоари</option>
                                    <option value="bags">Чанти</option>
                                    <option value="knitwear">Плетива</option>
                                    <option value="skirts">Поли</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Състояние</label>
                                <select id="f_condition">
                                    <option value="Отлично">Отлично</option>
                                    <option value="Много добро">Много добро</option>
                                    <option value="Добро">Добро</option>
                                </select>
                            </div>

                            <div class="field">
                                <label>Размер</label>
                                <select id="f_size">
                                    <option value="">—</option>
                                    <option value="XS">XS</option>
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L">L</option>
                                    <option value="XL">XL</option>
                                    <option value="one-size">Един размер</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Цвят</label>
                                <select id="f_color">
                                    <option value="">—</option>
                                    <option value="black">Черен</option>
                                    <option value="white">Бял</option>
                                    <option value="beige">Бежов</option>
                                    <option value="grey">Сив</option>
                                    <option value="navy">Тъмносин</option>
                                    <option value="pink">Розов</option>
                                    <option value="red">Червен</option>
                                </select>
                            </div>

                            <div class="field"><label>Текуща цена (EUR) *</label><input type="number" step="0.01" min="0" id="f_price" required /></div>
                            <div class="field"><label>Оригинална цена (EUR)</label><input type="number" step="0.01" min="0" id="f_original_price" placeholder="Преди намалението" /></div>

                            <div class="field"><label>Тагове (разделени със запетая)</label><input type="text" id="f_tags" placeholder="винтидж, официален, есен" /></div>
                            <div class="checkbox-field">
                                <input type="checkbox" id="f_is_sold" />
                                <label for="f_is_sold">Маркирай като Продадено</label>
                            </div>

                            <div class="field full"><label>Описание</label><textarea id="f_description"></textarea></div>

                            <div class="field full">
                                <label>Снимки</label>
                                <div class="dropzone" id="dropzone">
                                    <input type="file" id="f_images" accept="image/*" multiple hidden />
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    <p class="dropzone-title">Плъзнете снимки тук или <span>изберете файлове</span></p>
                                    <p class="dropzone-hint">Може да добавяте няколко пъти. Първата снимка е основна. Влачете, за да пренаредите.</p>
                                </div>
                                <div class="image-manager" id="imageManager"></div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="saveProductBtn">Запази продукта</button>
                            <button type="button" class="btn" onclick="closeProductForm()">Отказ</button>
                        </div>
                    </form>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <h2>Всички продукти</h2>
                        <button class="btn btn-primary" onclick="openProductForm()">+ Нов продукт</button>
                    </div>
                    <div id="productsTableWrap"><p class="loading-msg">Зареждане...</p></div>
                </div>
            </div>

            <!-- ORDERS TAB -->
            <div id="ordersTab" style="display:none;">
                <div class="panel">
                    <div class="panel-header"><h2>Поръчки</h2></div>
                    <div id="ordersTableWrap"><p class="loading-msg">Зареждане...</p></div>
                </div>
            </div>

        </div>
    </div>

    <div class="toast" id="toast"></div>


    <script>
        const BUCKET = 'product-images';
        let editingProductId = null;
        let allProducts      = [];

        /* ===== IMAGE MANAGER ===== */
        let imageItems = [];   // ordered: { id, type:'url'|'file', url, file? }
        let draggedId  = null;

        function uid() { return 'i' + Math.random().toString(36).slice(2, 9); }

        function resetImageItems(items) {
            imageItems.forEach(it => { if (it.type === 'file') URL.revokeObjectURL(it.url); });
            imageItems = items || [];
            renderImageManager();
        }

        function addFiles(fileList) {
            Array.from(fileList).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                imageItems.push({ id: uid(), type: 'file', file, url: URL.createObjectURL(file) });
            });
            renderImageManager();
        }

        function removeImage(id) {
            const it = imageItems.find(x => x.id === id);
            if (it && it.type === 'file') URL.revokeObjectURL(it.url);
            imageItems = imageItems.filter(x => x.id !== id);
            renderImageManager();
        }

        function reorderImages(fromId, toId) {
            if (!fromId || fromId === toId) return;
            const from = imageItems.findIndex(x => x.id === fromId);
            const to   = imageItems.findIndex(x => x.id === toId);
            if (from < 0 || to < 0) return;
            const [moved] = imageItems.splice(from, 1);
            imageItems.splice(to, 0, moved);
            renderImageManager();
        }

        /* step an image one slot left/right — used by the touch reorder arrows */
        function moveImage(id, dir) {
            const i = imageItems.findIndex(x => x.id === id);
            const j = i + dir;
            if (i < 0 || j < 0 || j >= imageItems.length) return;
            const [moved] = imageItems.splice(i, 1);
            imageItems.splice(j, 0, moved);
            renderImageManager();
        }

        function renderImageManager() {
            const wrap = document.getElementById('imageManager');
            if (!wrap) return;
            const isTouch = window.matchMedia('(hover: none)').matches;
            wrap.innerHTML = '';
            imageItems.forEach((it, i) => {
                const tile = document.createElement('div');
                tile.className = 'img-tile';
                tile.draggable = !isTouch;   // native drag only where it actually works
                tile.dataset.id = it.id;
                tile.innerHTML =
                    '<img src="' + it.url + '" alt="" />' +
                    (i === 0 ? '<span class="img-main-badge">Основна</span>' : '') +
                    (isTouch && i > 0 ? '<button type="button" class="img-move left" aria-label="Премести наляво">&lsaquo;</button>' : '') +
                    (isTouch && i < imageItems.length - 1 ? '<button type="button" class="img-move right" aria-label="Премести надясно">&rsaquo;</button>' : '') +
                    '<button type="button" class="img-remove" aria-label="Премахни">&times;</button>';
                tile.querySelector('.img-remove').addEventListener('click', (e) => { e.stopPropagation(); removeImage(it.id); });
                const mvL = tile.querySelector('.img-move.left');
                const mvR = tile.querySelector('.img-move.right');
                if (mvL) mvL.addEventListener('click', (e) => { e.stopPropagation(); moveImage(it.id, -1); });
                if (mvR) mvR.addEventListener('click', (e) => { e.stopPropagation(); moveImage(it.id, 1); });
                if (!isTouch) {
                    tile.addEventListener('dragstart', () => { draggedId = it.id; tile.classList.add('dragging'); });
                    tile.addEventListener('dragend',   () => { draggedId = null; tile.classList.remove('dragging'); document.querySelectorAll('.img-tile').forEach(t => t.classList.remove('drop-target')); });
                    tile.addEventListener('dragover',  (e) => { e.preventDefault(); tile.classList.add('drop-target'); });
                    tile.addEventListener('dragleave', () => tile.classList.remove('drop-target'));
                    tile.addEventListener('drop',      (e) => { e.preventDefault(); tile.classList.remove('drop-target'); reorderImages(draggedId, it.id); });
                }
                wrap.appendChild(tile);
            });
        }

        /* dropzone wiring */
        (function () {
            const dz = document.getElementById('dropzone');
            const input = document.getElementById('f_images');
            if (!dz || !input) return;
            dz.addEventListener('click', () => input.click());
            input.addEventListener('change', (e) => { addFiles(e.target.files); input.value = ''; });
            ['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.add('dragover'); }));
            dz.addEventListener('dragleave', (e) => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('dragover'); });
            dz.addEventListener('drop', (e) => {
                e.preventDefault();
                dz.classList.remove('dragover');
                if (e.dataTransfer && e.dataTransfer.files) addFiles(e.dataTransfer.files);
            });
        })();

        /* ===== AUTH STATE ===== */

        async function initAuth() {
            const { data } = await window.db.auth.getSession();
            if (data.session) {
                showDashboard(data.session.user.email);
            } else {
                document.getElementById('loginView').style.display = 'flex';
            }

            window.db.auth.onAuthStateChange((_event, session) => {
                if (session) {
                    showDashboard(session.user.email);
                } else {
                    document.getElementById('dashboardView').style.display = 'none';
                    document.getElementById('loginView').style.display = 'flex';
                }
            });
        }

        function showDashboard(email) {
            document.getElementById('loginView').style.display     = 'none';
            document.getElementById('dashboardView').style.display = 'block';
            document.getElementById('userEmail').textContent = email;
            loadProducts();
        }

        /* ===== LOGIN FORM ===== */

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            const btn     = document.getElementById('loginBtn');
            errorEl.style.display = 'none';
            btn.disabled    = true;
            btn.textContent = 'Влизане...';

            const email    = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPwd').value;

            const { error } = await window.db.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.textContent    = 'Грешен имейл или парола.';
                errorEl.style.display  = 'block';
                btn.disabled    = false;
                btn.textContent = 'Вход';
                return;
            }
        });

        async function doLogout() {
            await window.db.auth.signOut();
        }

        /* ===== TABS ===== */

        function switchTab(tab) {
            document.getElementById('productsTab').style.display = tab === 'products' ? 'block' : 'none';
            document.getElementById('ordersTab').style.display   = tab === 'orders'   ? 'block' : 'none';
            document.getElementById('tabProductsBtn').classList.toggle('active', tab === 'products');
            document.getElementById('tabOrdersBtn').classList.toggle('active', tab === 'orders');
            if (tab === 'orders') loadOrders();
        }

        /* ===== TOAST ===== */

        function toast(msg, isError) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className   = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => el.classList.remove('show'), 3200);
        }

        /* ===== PRODUCTS ===== */

        async function loadProducts() {
            const wrap = document.getElementById('productsTableWrap');
            const { data, error } = await window.db.from('products').select('*').order('created_at', { ascending: false });
            if (error) {
                wrap.innerHTML = '<p class="empty-msg">Грешка: ' + escHtml(error.message) + '</p>';
                return;
            }
            allProducts = data || [];
            renderProductsTable();
        }

        function renderProductsTable() {
            const wrap = document.getElementById('productsTableWrap');
            if (!allProducts.length) {
                wrap.innerHTML = '<p class="empty-msg">Все още няма продукти. Натиснете "+ Нов продукт".</p>';
                return;
            }

            const rows = allProducts.map(p => {
                const imgs  = Array.isArray(p.image_urls) ? p.image_urls : [];
                const img   = imgs[0] || '';
                const hasDiscount = p.original_price != null && Number(p.original_price) > Number(p.price);
                const priceHtml = hasDiscount
                    ? '€' + Number(p.price).toFixed(2) + ' <span class="price-old">€' + Number(p.original_price).toFixed(2) + '</span>'
                    : '€' + Number(p.price).toFixed(2);
                const statusLabel = p.is_sold ? 'Продаден' : 'Активен';
                const statusClass = p.is_sold ? 'status-sold' : 'status-available';

                return '<tr>' +
                    '<td class="cell-img" data-label="Снимка">' + (img ? '<img class="thumb-sm" src="' + escHtml(img) + '" />' : '') + '</td>' +
                    '<td data-label="Продукт"><span><strong>' + escHtml(p.brand || '') + '</strong><br><span style="color:var(--muted)">' + escHtml(p.name || '') + (p.size ? ' · ' + escHtml(p.size) : '') + '</span></span></td>' +
                    '<td data-label="Категория">' + escHtml(p.category || '') + '</td>' +
                    '<td data-label="Цена">' + priceHtml + '</td>' +
                    '<td data-label="Статус"><span class="status-pill ' + statusClass + '">' + statusLabel + '</span></td>' +
                    '<td data-label="Действия"><div class="row-actions">' +
                        '<button class="btn btn-small" onclick="openProductForm(\'' + p.id + '\')">Редактирай</button>' +
                        '<button class="btn btn-small btn-danger" onclick="deleteProduct(\'' + p.id + '\')">Изтрий</button>' +
                    '</div></td>' +
                    '</tr>';
            }).join('');

            wrap.innerHTML =
                '<table><thead><tr>' +
                '<th></th><th>Продукт</th><th>Категория</th><th>Цена</th><th>Статус</th><th>Действия</th>' +
                '</tr></thead><tbody>' + rows + '</tbody></table>';
        }

        function escHtml(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* product form */

        function openProductForm(id) {
            editingProductId = id || null;
            const panel = document.getElementById('productFormPanel');
            document.getElementById('productForm').reset();
            resetImageItems([]);
            document.getElementById('formTitle').textContent     = id ? 'Редактирай продукт' : 'Нов продукт';
            document.getElementById('f_is_sold').checked         = false;

            if (id) {
                const p = allProducts.find(x => x.id === id);
                if (p) {
                    document.getElementById('f_brand').value          = p.brand || '';
                    document.getElementById('f_name').value           = p.name  || '';
                    document.getElementById('f_category').value       = p.category  || 'jackets';
                    document.getElementById('f_condition').value      = p.condition || 'Отлично';
                    document.getElementById('f_size').value           = p.size  || '';
                    document.getElementById('f_color').value          = p.color || '';
                    document.getElementById('f_price').value          = p.price ?? '';
                    document.getElementById('f_original_price').value = p.original_price ?? '';
                    document.getElementById('f_tags').value           = (p.tags || []).join(', ');
                    document.getElementById('f_is_sold').checked      = !!p.is_sold;
                    document.getElementById('f_description').value    = p.description || '';

                    resetImageItems((p.image_urls || []).map(url => ({ id: uid(), type: 'url', url })));
                }
            }

            panel.style.display = 'block';
            panel.scrollIntoView({ behavior: 'smooth' });
        }

        function closeProductForm() {
            document.getElementById('productFormPanel').style.display = 'none';
            editingProductId = null;
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProductBtn');
            btn.disabled = true;
            btn.textContent = 'Запазване...';

            try {
                const tags = document.getElementById('f_tags').value
                    .split(',').map(t => t.trim()).filter(Boolean);
                const origPrice = document.getElementById('f_original_price').value;

                const payload = {
                    brand:          document.getElementById('f_brand').value.trim(),
                    name:           document.getElementById('f_name').value.trim(),
                    category:       document.getElementById('f_category').value,
                    condition:      document.getElementById('f_condition').value,
                    size:           document.getElementById('f_size').value || null,
                    color:          document.getElementById('f_color').value || null,
                    price:          parseFloat(document.getElementById('f_price').value),
                    original_price: origPrice ? parseFloat(origPrice) : null,
                    tags,
                    is_sold:        document.getElementById('f_is_sold').checked,
                    description:    document.getElementById('f_description').value.trim() || null,
                };

                let productId = editingProductId;

                if (productId) {
                    const { error } = await window.db.from('products').update(payload).eq('id', productId);
                    if (error) throw error;
                } else {
                    const { data, error } = await window.db.from('products').insert(payload).select().single();
                    if (error) throw error;
                    productId = data.id;
                }

                /* Assemble the final ordered image list: keep existing images in
                   place, upload any newly-added files, honour removals + reordering. */
                const finalUrls = [];
                for (const item of imageItems) {
                    if (item.type === 'url') finalUrls.push(item.url);
                    else finalUrls.push(await uploadOneImage(productId, item.file));
                }
                const { error: imgErr } = await window.db
                    .from('products')
                    .update({ image_urls: finalUrls })
                    .eq('id', productId);
                if (imgErr) throw imgErr;

                toast(editingProductId ? 'Продуктът е обновен.' : 'Продуктът е добавен.');
                closeProductForm();
                await loadProducts();
            } catch (err) {
                console.error(err);
                toast('Грешка: ' + err.message, true);
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Запази продукта';
            }
        });

        async function uploadOneImage(productId, file) {
            const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
            const token    = Math.random().toString(36).slice(2, 7);
            const path     = productId + '/' + Date.now() + '-' + token + '-' + safeName;
            const { error } = await window.db.storage.from(BUCKET).upload(path, file, { upsert: false });
            if (error) throw error;
            const { data } = window.db.storage.from(BUCKET).getPublicUrl(path);
            return data.publicUrl;
        }

        async function deleteProduct(id) {
            if (!confirm('Сигурни ли сте, че искате да изтриете този продукт?')) return;
            const { error } = await window.db.from('products').delete().eq('id', id);
            if (error) { toast('Грешка: ' + error.message, true); return; }
            toast('Продуктът е изтрит.');
            await loadProducts();
        }

        /* ===== ORDERS ===== */

        async function loadOrders() {
            const wrap = document.getElementById('ordersTableWrap');
            const { data, error } = await window.db.from('orders').select('*').order('created_at', { ascending: false });
            if (error) {
                wrap.innerHTML = '<p class="empty-msg">Грешка: ' + escHtml(error.message) + '</p>';
                return;
            }
            if (!data || !data.length) {
                wrap.innerHTML = '<p class="empty-msg">Все още няма поръчки.</p>';
                return;
            }
            const rows = data.map(o => {
                const snap = o.product_snapshot || {};
                const date = new Date(o.created_at).toLocaleString('bg-BG');
                return '<tr>' +
                    '<td data-label="Дата" style="white-space:nowrap;">' + date + '</td>' +
                    '<td data-label="Продукт">' + escHtml((snap.brand || '') + ' ' + (snap.name || '')) + '</td>' +
                    '<td data-label="Клиент"><span>' + escHtml(o.full_name || '') + '<br><span style="color:var(--muted)">' + escHtml(o.email || '') + '</span></span></td>' +
                    '<td data-label="Адрес">' + escHtml((o.street || '') + ', ' + (o.city || '') + ' ' + (o.postcode || '')) + '</td>' +
                    '<td data-label="Бележки">' + escHtml(o.notes || '') + '</td>' +
                    '<td data-label="Статус"><select onchange="updateOrderStatus(\'' + o.id + '\', this.value)">' +
                        ['new','contacted','confirmed','cancelled'].map(s =>
                            '<option value="' + s + '"' + (o.status === s ? ' selected' : '') + '>' + orderStatusLabel(s) + '</option>'
                        ).join('') +
                    '</select></td></tr>';
            }).join('');
            wrap.innerHTML =
                '<table><thead><tr><th>Дата</th><th>Продукт</th><th>Клиент</th><th>Адрес</th><th>Бележки</th><th>Статус</th></tr></thead>' +
                '<tbody>' + rows + '</tbody></table>';
        }

        function orderStatusLabel(s) {
            return { new:'Нова', contacted:'Свързахме се', confirmed:'Потвърдена', cancelled:'Отказана' }[s] || s;
        }

        async function updateOrderStatus(id, status) {
            const { error } = await window.db.from('orders').update({ status }).eq('id', id);
            if (error) { toast('Грешка: ' + error.message, true); return; }
            toast('Статусът е обновен.');
        }

        /* ===== INIT ===== */
        initAuth();
    </script>

</body>
</html>
